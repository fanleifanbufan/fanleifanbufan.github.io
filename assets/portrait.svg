      <stop offset="0%" stop-color="#14141c"/>
      <stop offset="100%" stop-color="#1a1a24"/>
    </linearGradient>
    <linearGradient id="glow1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#c9a96e" stop-opacity="0.12"/>
